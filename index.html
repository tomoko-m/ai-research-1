<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Research: Two Platforms, Same Pattern</title>

<style>
  :root { --bg: #050508; --surface: #0f0f17; --border: #1e1e2e; --accent: #ff4d4d; --accent2: #4d9fff; --text: #e8e8f0; --muted: #717180; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.8; }
  
  .hero { background: radial-gradient(circle at top, #1a1a2e 0%, #050508 70%); padding: 100px 20px; text-align: center; border-bottom: 1px solid var(--border); }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(32px, 7vw, 52px); margin-bottom: 20px; letter-spacing: -0.01em; }
  h1 em { color: var(--accent); font-style: italic; }
  .hero p { color: var(--muted); font-size: 18px; max-width: 800px; margin: 0 auto; }

  .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
  
  .tabs { display: flex; gap: 15px; margin-bottom: 60px; justify-content: center; flex-wrap: wrap; }
  .tab { padding: 14px 30px; cursor: pointer; background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; transition: 0.4s; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .tab.active-gemini { color: var(--accent); border-color: var(--accent); background: rgba(255,77,77,0.1); }
  .tab.active-chatgpt { color: var(--accent2); border-color: var(--accent2); background: rgba(77,159,255,0.1); }
  .tab.active-comparison { color: #fff; border-color: #fff; background: rgba(255,255,255,0.1); }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.5s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .evidence-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 50px; }
  .img-box { width: 100%; min-height: 400px; background: #08080c; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
  .img-box img { width: 100%; height: auto; display: block; }
  
  .content-area { padding: 50px; }
  .label { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 25px; color: var(--accent); }
  #chatgpt .label { color: var(--accent2); }
  #comparison .label { color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 20px; }

  .analysis-text { font-size: 17px; opacity: 0.95; }
  .analysis-text p { margin-bottom: 25px; }
  .analysis-text ul { margin-bottom: 25px; padding-left: 20px; }
  .analysis-text li { margin-bottom: 15px; list-style: square; }
  
  .comp-table { width: 100%; border-collapse: collapse; margin-top: 40px; border: 1px solid var(--border); background: rgba(255,255,255,0.01); }
  .comp-table th, .comp-table td { padding: 25px; text-align: left; border-bottom: 1px solid var(--border); font-size: 15px; }
  .comp-table th { background: rgba(255,255,255,0.05); color: var(--muted); text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }
