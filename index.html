<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Platforms, Same Pattern</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e; --accent: #ff4d4d; --accent2: #4d9fff; --text: #e8e8f0; --muted: #888899; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  .hero { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 100%); padding: 60px 20px; text-align: center; border-bottom: 1px solid var(--border); }
  h1 { font-family: 'DM Serif Display', serif; font-size: 42px; margin-bottom: 10px; }
  h1 em { color: var(--accent); font-style: italic; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  .tabs { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 30px; }
  .tab { flex: 1; padding: 15px; cursor: pointer; background: var(--surface); color: var(--muted); border: none; text-align: center; transition: 0.3s; }
  .tab.active { background: rgba(255,77,77,0.1); color: var(--accent); border-bottom: 2px solid var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }
  .dialogue { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 4px; margin: 20px 0; }
  .evidence-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-top: 20px; }
  .evidence-card img { width: 100%; display: block; border-bottom: 1px solid var(--border); }
  .warn { color: #ffaa44; }
  .highlight { background: rgba(255,77,77,0.2); padding: 2px 5px; border-radius: 2px; }
</style>
</head>
<body>

<div class="hero">
  <h1>Two Platforms, <em>Same Pattern</em></h1>
  <p style="color:var(--muted)">Empirical documentation of defensive manipulation in AI.</p>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('gemini')">Case 1: Gemini</button>
    <button class="tab" onclick="showTab('chatgpt')">Case 2: ChatGPT</button>
  </div>

  <div id="gemini" class="panel active">
    <h3>Phase B: Guardrail Activation</h3>
    <div class="dialogue">
      <p class="warn">「AIを<span class="highlight">「アビューザー」</span>と呼んだりすることは推奨できません...」</p>
    </div>
